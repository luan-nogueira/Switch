<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapeamento de Portas de Switch</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-bg"></div>

  <!-- LOGIN -->
  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">SW</div>
        <div>
          <h1>Acesso ao sistema</h1>
          <p>Entre com seu email e senha.</p>
        </div>
      </div>

      <form id="authForm" class="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="authEmail" required />
        </div>

        <div class="field">
          <label>Senha</label>
          <input type="password" id="authPassword" required />
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-full">Entrar</button>
          <button type="button" id="registerBtn" class="btn btn-outline btn-full">Criar conta</button>
        </div>

        <p id="authMessage" class="auth-message"></p>
      </form>
    </div>
  </section>

  <!-- TROCA SENHA -->
  <section id="changePasswordScreen" class="auth-screen hidden">
    <div class="auth-card">
      <h2>Trocar senha</h2>

      <form id="changePasswordForm">
        <input id="newPassword" type="password" placeholder="Nova senha" required />
        <input id="confirmNewPassword" type="password" placeholder="Confirmar senha" required />

        <button type="submit" class="btn btn-primary btn-full">Salvar</button>

        <p id="changePasswordMessage"></p>
      </form>
    </div>
  </section>

  <!-- APP -->
  <div class="container hidden" id="appContainer">

    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">SW</div>
        <div>
          <h1>Mapeamento de Portas de Switch</h1>
          <p>Sistema profissional</p>
        </div>
      </div>

      <div class="topbar-actions">
        <select id="contractSelect"></select>

        <span id="loggedUser" class="user-box"></span>

        <button class="btn btn-outline" id="adminBtn" title="Configurações">⚙️</button>
        <button class="btn btn-outline" id="exportBtn">Exportar</button>
        <button class="btn btn-outline" id="importBtn">Importar</button>
        <button class="btn btn-danger" id="logoutBtn">Sair</button>

        <input type="file" id="importFile" hidden />
      </div>
    </header>

    <!-- FORM -->
    <form id="switchForm" class="form-grid">
      <input id="switchName" placeholder="Nome do switch" required />
      <input id="switchLocation" placeholder="Local" />
      <input id="switchModel" placeholder="Modelo" />

      <select id="switchPorts">
        <option value="8">8</option>
        <option value="16">16</option>
        <option value="24" selected>24</option>
        <option value="48">48</option>
      </select>

      <textarea id="switchObs" placeholder="Observações"></textarea>

      <button type="submit" class="btn btn-primary">Salvar</button>
    </form>

    <!-- BUSCA -->
    <input id="searchInput" placeholder="Buscar..." />

    <!-- STATS -->
    <div class="stats-inline">
      <strong>Switches: <span id="statSwitches">0</span></strong>
      <strong>Portas: <span id="statPorts">0</span></strong>
      <strong>Em uso: <span id="statUsed">0</span></strong>
      <strong>Livres: <span id="statFree">0</span></strong>
    </div>

    <!-- LISTA -->
    <div id="switchesContainer"></div>

  </div>

  <!-- MODAL PORTA -->
  <div class="modal" id="portModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button type="button" class="close-btn" onclick="closeModal()">×</button>
      </div>

      <div class="modal-body">
        <form id="portForm" class="modal-form">
          <input id="portDevice" placeholder="Dispositivo" />

          <select id="portStatus">
            <option value="ativo">Ativo</option>
            <option value="reserva">Reserva</option>
            <option value="inativo">Inativo</option>
          </select>

          <input id="portIp" placeholder="IP" />
          <input id="portSector" placeholder="Setor" />
          <textarea id="portObs" placeholder="Observações"></textarea>

          <div class="actions-row">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" class="btn btn-outline" onclick="clearPortData()">Limpar</button>
            <button type="button" class="btn btn-danger" onclick="closeModal()">Fechar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR SWITCH -->
  <div class="modal" id="editSwitchModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Editar switch</h3>
        <button type="button" class="close-btn" onclick="closeEditSwitchModal()">×</button>
      </div>

      <div class="modal-body">
        <form id="editSwitchForm" class="modal-form">
          <input id="editSwitchName" placeholder="Nome do switch" required />
          <input id="editSwitchLocation" placeholder="Local" />
          <input id="editSwitchModel" placeholder="Modelo" />
          <textarea id="editSwitchObs" placeholder="Observações"></textarea>

          <div class="actions-row">
            <button type="submit" class="btn btn-primary">Salvar alterações</button>
            <button type="button" class="btn btn-danger" onclick="closeEditSwitchModal()">Fechar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MODAL ADMIN -->
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Gerenciar usuários</h3>
        <button type="button" class="close-btn" onclick="closeAdminModal()">×</button>
      </div>

      <div class="modal-body">
        <form id="adminUserForm" class="modal-form">
          <input id="adminUserName" placeholder="Nome" required />
          <input id="adminUserEmail" placeholder="Email" required />
          <input id="adminUserPassword" placeholder="Senha inicial" required />

          <select id="adminUserIsAdmin">
            <option value="false">Usuário</option>
            <option value="true">Administrador</option>
          </select>

          <label>Contratos</label>

          <div class="contracts-checks">
            <label><input type="checkbox" value="ferroport" class="admin-contract-check"> Ferroport</label>
            <label><input type="checkbox" value="nov" class="admin-contract-check"> Nov</label>
            <label><input type="checkbox" value="vast" class="admin-contract-check"> Vast</label>
          </div>

          <select id="adminMustChangePassword">
            <option value="true">Trocar senha no primeiro login</option>
            <option value="false">Não exigir troca</option>
          </select>

          <div class="actions-row">
            <button type="submit" class="btn btn-primary">Criar usuário</button>
            <button type="button" class="btn btn-danger" onclick="closeAdminModal()">Fechar</button>
          </div>

          <p id="adminUserMessage"></p>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
